name: CI

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 24]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint PR title
        if: ${{ matrix.node-version == 20 }}
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: printf "%s\n" "$PR_TITLE" | pnpm exec commitlint --verbose

      - name: Run checks
        run: pnpm run check

      - name: Build package
        run: pnpm run build